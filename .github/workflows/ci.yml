name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"  # daily 6am UTC — seed crawl

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run flake8 datasmith/ tests/ --max-line-length=100 --exclude=.venv --count

      - name: Test
        run: uv run pytest tests/ -v --tb=short -Wignore::FutureWarning -Wignore::DeprecationWarning

      - name: Test importable
        run: uv run python -c "from datasmith.generation import generator, engine; from datasmith.imperfections import analyzer, injector, profiles; print('All modules importable')"

  seed-crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python 3.12
        run: uv python pin 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Configure git (needed before script runs)
        run: |
          git config --local user.email "datasmith-bot@users.noreply.github.com"
          git config --local user.name "DataSmith Bot"

      - name: Run crawl + analyze
        run: uv run python scripts/crawl_and_analyze.py

      - name: Commit and push results
        run: |
          git add data/datasmith.db
          git diff --staged --quiet || git commit -m "daily seed crawl: $(date +%Y-%m-%d)"
          git push
